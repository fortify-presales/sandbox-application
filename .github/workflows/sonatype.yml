# Create Github Action Repository Variables for your version of the application:
#   LIFECYCLE_SERVER_URL - The URL of your Sonatype Lifecycle server (e.g. https://your-lifecycle-server.com)
# Create Github Action Secrets for your version of the application:
#   LIFECYCLE_USERNAME - The username for your Sonatype Lifecycle server.
#   LIFECYCLE_PASSWORD - The password for your Sonatype Lifecycle server.
name: Sonatype Security Scan

# Set the permissions for the GITHUB_TOKEN to allow the workflow to read repository contents, write security events, and write pull request comments. This is necessary for the workflow to function properly, as it needs to access the codebase for scanning, report security findings, and comment on pull requests with the results.
permissions:
  contents: read
  security-events: write
  pull-requests: write
  
on:
  push:
    branches: [ main, feature/**, bugfix/** ]
    paths:
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Global environment variables
env:
  DEFAULT_APP_NAME: "sandbox-application"
  DEFAULT_PARENT_RELEASE_NAME: "main"
  DEFAULT_APP_ID: "sandbox-application"

jobs:
  Prepare:
    runs-on: ubuntu-latest
    outputs:
      FOD_RELEASE: ${{ steps.commands.outputs.FOD_RELEASE }}
      FOD_PARENT_RELEASE: ${{ steps.commands.outputs.FOD_PARENT_RELEASE }}
      LIFECYCLE_APP_ID: ${{ steps.commands.outputs.LIFECYCLE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up environment variables
        id: commands
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Running in a pull request pipeline ..."
            echo "FOD_RELEASE=${{ env.DEFAULT_APP_NAME }}:merge-to-${{ github.base_ref }}#PR${{ github.event.number }}" >> $GITHUB_OUTPUT
            echo "FOD_PARENT_RELEASE=${{ env.DEFAULT_APP_NAME }}:${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "Running in a branch pipeline ..."
            echo "FOD_RELEASE=${{ env.DEFAULT_APP_NAME }}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "FOD_PARENT_RELEASE=${{ env.DEFAULT_APP_NAME }}:${{ github.event.repository.default_branch }}" >> $GITHUB_OUTPUT
          fi
          echo "LIFECYCLE_APP_ID=${{ env.DEFAULT_APP_ID }}" >> $GITHUB_OUTPUT

  sonatype-scan:
    needs: Prepare
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || contains(github.ref, 'main') || contains(github.ref, 'feature/') || contains(github.ref, 'bugfix/')
    env:
      LIFECYCLE_APP_ID: ${{ needs.Prepare.outputs.LIFECYCLE_APP_ID }}
    steps:
      # Check out your code
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
      # Perform an evaluation
      - name: Run evaluate action
        id: evaluate
        uses: sonatype/actions/evaluate@v1
        with:
          iq-server-url: ${{ vars.LIFECYCLE_SERVER_URL }}
          username: ${{ vars.LIFECYCLE_USERNAME }}
          password: ${{ secrets.LIFECYCLE_PASSWORD }}
          application-id: ${{ env.LIFECYCLE_APP_ID }}
          scan-targets: package.json package-lock.json
      # Set up fcli
      - name: Set up fcli
        uses: fortify/github-action/setup@v3
        with:
          fcli: bootstrapped
      # Import the Sonatype SBOM into FoD
      - name: Import Sonatype SBOM into FoD
        env:
          FOD_URL: ${{ vars.FOD_URL }}
          FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
          FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
          LIFECYCLE_SERVER_URL: ${{ vars.LIFECYCLE_SERVER_URL }}
          LIFECYCLE_USERNAME: ${{ vars.LIFECYCLE_USERNAME }}
          LIFECYCLE_PASSWORD: ${{ secrets.LIFECYCLE_PASSWORD }}
          FOD_RELEASE: ${{ needs.Prepare.outputs.FOD_RELEASE }}
          FOD_PARENT_RELEASE: ${{ needs.Prepare.outputs.FOD_PARENT_RELEASE }}
        run: |
          set -euo pipefail

          : "${FOD_URL:?FOD_URL repository variable is required}"
          : "${FOD_CLIENT_ID:?FOD_CLIENT_ID secret is required}"
          : "${FOD_CLIENT_SECRET:?FOD_CLIENT_SECRET secret is required}"
          : "${LIFECYCLE_SERVER_URL:?LIFECYCLE_SERVER_URL repository variable is required}"
          : "${LIFECYCLE_USERNAME:?LIFECYCLE_USERNAME secret is required}"
          : "${LIFECYCLE_PASSWORD:?LIFECYCLE_PASSWORD secret is required}"
          : "${FOD_RELEASE:?FOD_RELEASE is required}"

          fcli fod session login \
            --url "${FOD_URL}" \
            --client-id "${FOD_CLIENT_ID}" \
            --client-secret "${FOD_CLIENT_SECRET}"

          fcli fod action run ./etc/sonatype-fod-sbom-import-action.yaml --on-unsigned=ignore \
            --sonatype-url="${LIFECYCLE_SERVER_URL}" --sonatype-username="${LIFECYCLE_USERNAME}" \
            --sonatype-password="${LIFECYCLE_PASSWORD}" --sonatype-app-id="${LIFECYCLE_APP_ID}" \
            --sonatype-stage="build" --sonatype-cyclonedx-version="1.4" \
            --fod-release="${FOD_RELEASE}" --sbom-file="sonatype-sbom.cdx.json" --fod-session="default"

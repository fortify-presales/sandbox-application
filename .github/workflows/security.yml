name: Security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  fortify:
    uses: fortify-presales/platform-workflows/.github/workflows/reusable-fortify-fod.yml@v1
    with:
      language: node
      source_dir: .
      build_strategy: auto
      sast_assessment_type: Static Assessment
      do_aviator_audit: true
      package_extra_opts: -bt none
      do_sca_scan: false
      do_check_policy: true
    secrets: inherit

  sonatype:
    uses: fortify-presales/platform-workflows/.github/workflows/reusable-sonatype-sca.yml@v1
    with:
      application_id: ${{ vars.LIFECYCLE_APPLICATION_ID != '' && vars.LIFECYCLE_APPLICATION_ID || github.event.repository.name }}
      organization_id: ${{ vars.LIFECYCLE_ORGANIZATION_ID != '' && vars.LIFECYCLE_ORGANIZATION_ID || github.repository_owner }}
      create_application_if_missing: true
      scan_targets: package.json package-lock.json
    secrets: inherit

  gate:
    needs: [fortify, sonatype]
    if: ${{ always() && !cancelled() }}
    uses: fortify-presales/platform-workflows/.github/workflows/reusable-security-gate.yml@v1
    with:
      required_statuses_csv: >-
        Fortify=${{ needs.fortify.result }},Sonatype=${{ needs.sonatype.result }}

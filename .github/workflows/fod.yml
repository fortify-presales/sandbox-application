# Create GitHub Action Repository Variables for your version of the application:
#   FOD_URL                     - FoD Portal URL for your tenant (e.g. https://ams.fortify.com)
#   FOD_DEFAULT_APP_NAME        - Optional FoD app name override (defaults to repository name if unset)
#   FOD_DEFAULT_OWNER           - Optional FoD app owner user id override (fallback omits --app-owner)
#   FOD_DEFAULT_ASSESSMENT_TYPE - Optional assessment type override (defaults to "Static Assessment")
#   FOD_ALLOW_SETUP_WITHOUT_OWNER - Optional override (true/false). If true, skip owner preflight failure.
# Create GitHub Action Secrets for your version of the application:
#   FOD_CLIENT_ID should be an API Key obtained from your FoD tenant.
#   FOD_CLIENT_SECRET should be the secret for the API Key obtained for your FoD tenant.
# Helpful hints:
#   API Key credentials can be obtained from your FoD tenant, under Administration -> Settings -> API
#   It is recommended to create credentials with 'Security Lead' Role selected.
#   "Automated Audit preference" should be configured for the release's Static Scan Settings.
name: Fortify on Demand Security Scan

# Set the permissions for the GITHUB_TOKEN to allow the workflow to read repository contents, write security events, and write pull request comments. This is necessary for the workflow to function properly, as it needs to access the codebase for scanning, report security findings, and comment on pull requests with the results.
permissions:
  contents: read
  security-events: write
  pull-requests: write

on:
  push:
    branches: [ main, feature/**, bugfix/** ]
    paths:
      - '**'
      - '!.github/**'
      - '.github/workflows/fod.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**'
      - '!.github/**'
      - '.github/workflows/fod.yml'
  workflow_dispatch:

# Global environment variables
env:
  DEFAULT_APP_NAME: ${{ vars.FOD_DEFAULT_APP_NAME || github.event.repository.name }}
  NODE_VERSION: "18"

jobs:
  Prepare:
    runs-on: ubuntu-latest
    outputs:
      FOD_RELEASE: ${{ steps.commands.outputs.FOD_RELEASE }}
      FOD_PARENT_RELEASE: ${{ steps.commands.outputs.FOD_PARENT_RELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up environment variables
        id: commands
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Running in a pull request pipeline ..."
            echo "FOD_RELEASE=${{ env.DEFAULT_APP_NAME }}:merge-to-${{ github.base_ref }}#PR${{ github.event.number }}" >> $GITHUB_OUTPUT
            echo "FOD_PARENT_RELEASE=${{ env.DEFAULT_APP_NAME }}:${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "Running in a branch pipeline ..."
            echo "FOD_RELEASE=${{ env.DEFAULT_APP_NAME }}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "FOD_PARENT_RELEASE=${{ env.DEFAULT_APP_NAME }}:${{ github.event.repository.default_branch }}" >> $GITHUB_OUTPUT
          fi 

  fortify-ast-scan:
    runs-on: ubuntu-latest
    needs: [ Prepare ]
    env: 
      FOD_RELEASE: ${{ needs.Prepare.outputs.FOD_RELEASE }}
      FOD_PARENT_RELEASE: ${{ needs.Prepare.outputs.FOD_PARENT_RELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - name: Preflight FoD setup inputs
        shell: bash
        env:
          FOD_DEFAULT_OWNER: ${{ vars.FOD_DEFAULT_OWNER }}
          FOD_ALLOW_SETUP_WITHOUT_OWNER: ${{ vars.FOD_ALLOW_SETUP_WITHOUT_OWNER || 'false' }}
          FOD_RELEASE: ${{ env.FOD_RELEASE }}
          FOD_PARENT_RELEASE: ${{ env.FOD_PARENT_RELEASE }}
        run: |
          if [[ -z "${FOD_DEFAULT_OWNER}" ]]; then
            if [[ "${FOD_ALLOW_SETUP_WITHOUT_OWNER,,}" == "true" ]]; then
              echo "::warning title=Missing FOD_DEFAULT_OWNER::Proceeding without --app-owner because FOD_ALLOW_SETUP_WITHOUT_OWNER=true."
            else
              echo "::error title=Missing FOD_DEFAULT_OWNER::Set repository variable FOD_DEFAULT_OWNER or set FOD_ALLOW_SETUP_WITHOUT_OWNER=true if setup is not expected to create a new application."
              echo "::error::Release=${FOD_RELEASE}, ParentRelease=${FOD_PARENT_RELEASE}"
              exit 1
            fi
          else
            echo "Using FOD_DEFAULT_OWNER for setup."
          fi
      #
      # See: https://fortify.github.io/fcli/v3/ci/github/v3.0.x/ast-action-fod.html
      #
      - name: Run FoD SAST and SCA Scan
        timeout-minutes: 360
        uses: fortify/github-action@v3
        env:
          #FCLI_BOOTSTRAP_VERSION: YOUR_CUSTOM_FCLI_BOOTSTRAP_VERSION
          FOD_URL: ${{ vars.FOD_URL }}
          FOD_CLIENT_ID: ${{secrets.FOD_CLIENT_ID}}
          FOD_CLIENT_SECRET: ${{secrets.FOD_CLIENT_SECRET}}
          SETUP_EXTRA_OPTS: ${{ vars.FOD_DEFAULT_OWNER && format('--sdlc-status Development --app-owner {0}', vars.FOD_DEFAULT_OWNER) || '--sdlc-status Development' }}
          PACKAGE_EXTRA_OPTS: -bt none
          COPY_FROM_RELEASE: ${{ env.FOD_PARENT_RELEASE }}
          SAST_ASSESSMENT_TYPE: ${{ vars.FOD_DEFAULT_ASSESSMENT_TYPE || 'Static Assessment' }}
          SAST_WAIT_EXTRA_OPTS: --timeout 3h
          DO_SETUP: true
          DO_SAST_SCAN: true
          DO_AVIATOR_AUDIT: true
          DO_SCA_SCAN: false
          DO_WAIT: true
          DO_CHECK_POLICY: true
          DO_RELEASE_SUMMARY: true
          DO_PR_COMMENT: true
          DO_SAST_EXPORT: true
          CHECK_POLICY_ACTION: etc/custom-check-policy.yaml
          CHECK_POLICY_EXTRA_OPTS: --on-unsigned=ignore
